version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/users/queries.sql"
    schema: "cmd/migrate/migrations/"
    gen:
      go:
        package: "userssqlc"
        out: "internal/users/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "pg_catalog.uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
          - db_type: "text"
            go_type: "string"
          - db_type: "varchar"
            go_type: "string"

