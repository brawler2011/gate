openapi: 3.0.3
info:
  title: CoreService API
  version: 0.0.1
paths:
  /problems:
    get:
      operationId: ListProblems
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
        - name: search
          in: query
          schema:
            type: string
          example: Fibonacci
        - name: descending
          in: query
          schema:
            type: boolean
        - name: owner
          in: query
          schema:
            type: boolean
          example: true
        - name: organization_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProblemsResponseModel'
    post:
      operationId: CreateProblem
      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
          example: Problem 1
        - name: organization_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreationResponseModel'
  /problems/{id}:
    get:
      operationId: GetProblem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProblemResponseModel'
    delete:
      operationId: DeleteProblem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content: {}
    patch:
      operationId: UpdateProblem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProblemRequestModel'
      responses:
        '200':
          description: OK
          content: {}
  /contests:
    post:
      operationId: CreateContest
      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
          example: Contest 1
        - name: organization_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreationResponseModel'
  /admin/contests:
    get:
      operationId: ListAdminContests
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
        - name: search
          in: query
          schema:
            type: string
          example: Contest
        - name: visibility
          in: query
          schema:
            type: string
            enum:
              - public
              - private
        - name: sortBy
          in: query
          schema:
            type: string
            enum:
              - created_at
              - updated_at
              - title
          example: created_at
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          example: desc
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListContestsResponseModel'
  /user/{id}/contests:
    get:
      operationId: ListUserContests
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
        - name: search
          in: query
          schema:
            type: string
          example: Contest
        - name: sortBy
          in: query
          schema:
            type: string
            enum:
              - last_submission_time
              - created_at
              - updated_at
              - title
          example: last_submission_time
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          example: desc
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUserContestsResponseModel'
  /workshop/contests:
    get:
      operationId: ListWorkshopContests
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
        - name: search
          in: query
          schema:
            type: string
          example: Contest
        - name: sortBy
          in: query
          schema:
            type: string
            enum:
              - created_at
              - updated_at
              - title
          example: created_at
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          example: desc
        - name: organization_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListContestsResponseModel'
  /public/contests:
    get:
      operationId: ListPublicContests
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
        - name: search
          in: query
          schema:
            type: string
          example: Contest
        - name: sortBy
          in: query
          schema:
            type: string
            enum:
              - created_at
              - updated_at
              - title
          example: created_at
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          example: desc
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListContestsResponseModel'
  /contests/{contest_id}:
    get:
      operationId: GetContest
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetContestResponseModel'
    delete:
      operationId: DeleteContest
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
    patch:
      operationId: UpdateContest
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContestRequestModel'
      responses:
        '200':
          description: OK
  /contests/{contest_id}/problems:
    post:
      operationId: CreateContestProblem
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: problem_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreationResponseModel'
  /contests/{contest_id}/problems/{problem_id}:
    get:
      operationId: GetContestProblem
      parameters:
        - name: problem_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetContestProblemResponseModel'
    delete:
      operationId: DeleteContestProblem
      parameters:
        - name: problem_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  /contests/{contest_id}/members:
    get:
      operationId: ListContestMembers
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListContestMembersResponseModel'
    post:
      operationId: CreateContestMember
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreationResponseModel'
    delete:
      operationId: DeleteContestMember
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
    patch:
      operationId: UpdateContestMember
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: role
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /contests/{contest_id}/my-role:
    get:
      operationId: GetMyContestRole
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMyContestRoleResponseModel'
  /contests/{contest_id}/submissions:
    get:
      operationId: ListContestSubmissions
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: problemId
          in: query
          schema:
            type: string
            format: uuid
        - name: state
          in: query
          schema:
            type: integer
            format: int32
          example: 1
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          example: asc
        - name: language
          in: query
          schema:
            type: integer
            format: int32
          example: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSubmissionsResponseModel'
  /submissions:
    post:
      operationId: CreateSubmission
      parameters:
        - name: problem_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: contest_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: language
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubmissionRequestModel'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreationResponseModel'
    get:
      operationId: ListSubmissions
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
        - name: contestId
          in: query
          schema:
            type: string
            format: uuid
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: problemId
          in: query
          schema:
            type: string
            format: uuid
        - name: state
          in: query
          schema:
            type: integer
            format: int32
          example: 1
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          example: asc
        - name: language
          in: query
          schema:
            type: integer
            format: int32
          example: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSubmissionsResponseModel'
  /submissions/{submission_id}:
    get:
      operationId: GetSubmission
      parameters:
        - name: submission_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetSubmissionResponseModel'
  /health:
    get:
      operationId: GetHealth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetHealthResponseModel'
  /users:
    get:
      operationId: ListUsers
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
        - name: search
          in: query
          schema:
            type: string
          example: john
        - name: role
          in: query
          schema:
            type: string
          example: admin
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsersResponseModel'
  /users/{id}:
    get:
      operationId: GetUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserResponseModel'
  /users/{user_id}/submissions:
    get:
      operationId: ListUserSubmissions
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
        - name: contestId
          in: query
          schema:
            type: string
            format: uuid
        - name: problemId
          in: query
          schema:
            type: string
            format: uuid
        - name: state
          in: query
          schema:
            type: integer
            format: int32
          example: 1
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          example: asc
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSubmissionsResponseModel'
  /users/me:
    get:
      operationId: GetMe
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserResponseModel'
    patch:
      operationId: PatchMe
      summary: Update current user profile
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchMeRequestModel'
      responses:
        '200':
          description: Profile updated successfully
  /users/{id}/avatar:
    get:
      operationId: GetUserAvatar
      summary: Get user avatar by user ID
      parameters:
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User avatar
          headers:
            ETag:
              schema:
                type: string
          content:
            image/png: {}
        '304':
          description: Not modified
          headers:
            ETag:
              schema:
                type: string
        '400':
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: UploadAvatar
      summary: Upload user avatar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  imgId:
                    type: string
                    format: uuid
    delete:
      operationId: DeleteAvatar
      summary: Delete user avatar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Avatar deleted successfully
  /problems/{id}/import:
    post:
      operationId: ImportProblem
      summary: Import package into existing problem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                package:
                  type: string
                  format: binary
                  description: Problem package archive (zip)
      responses:
        '200':
          description: Problem imported successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /problems/{id}/publish:
    post:
      operationId: PublishProblem
      summary: Publish problem package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Problem published successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: integer
                    format: int32
                  message:
                    type: string
  /problems/{id}/packages:
    get:
      operationId: ListProblemPackages
      summary: List all packages for a problem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of problem packages
          content:
            application/json:
              schema:
                type: object
                properties:
                  packages:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        version:
                          type: integer
                          format: int32
                        status:
                          type: string
                        package_hash:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        compiled_at:
                          type: string
                          format: date-time
  /problems/{id}/package/{version}:
    get:
      operationId: GetPublishedPackage
      summary: Get redirect to published problem package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect to package download URL
          headers:
            Location:
              schema:
                type: string
                description: Presigned S3 URL for package download
  /problems/{problemId}/workshop/init:
    post:
      operationId: InitProblemWorkshop
      summary: Initialize problem workspace
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Workshop initialized successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /problems/{problemId}/readme:
    get:
      operationId: GetProblemReadme
      summary: Get problem README
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: README content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
    put:
      operationId: UpdateProblemReadme
      summary: Update problem README
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: README updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /problems/{problemId}/limits:
    get:
      operationId: GetProblemLimits
      summary: Get problem limits and type settings
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Problem limits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemLimits'
    patch:
      operationId: UpdateProblemLimits
      summary: Update problem limits and type settings
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProblemLimitsRequest'
      responses:
        '200':
          description: Limits updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemLimits'
  /problems/{problemId}/statement:
    get:
      operationId: GetProblemStatement
      summary: Get problem statement
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Problem statement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemStatement'
    patch:
      operationId: UpdateProblemStatement
      summary: Update problem statement
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
