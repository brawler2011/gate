paths:
  /auth/register:
    post:
      operationId: Register
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequestModel"
      responses:
        "200":
          description: Successfully registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponseModel"
  /auth/login:
    post:
      operationId: Login
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequestModel"
      responses:
        "200":
          description: Successfully logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponseModel"
  /auth/logout:
    post:
      operationId: Logout
      tags:
        - auth
      responses:
        "200":
          description: Successfully logged out

components:
  schemas:
    RegisterRequestModel:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          example: "john_doe"
        email:
          type: string
          format: email
          example: "john@example.com"
        password:
          type: string
          format: password
          example: "secret123"
    LoginRequestModel:
      type: object
      required:
        - identifier
        - password
      properties:
        identifier:
          type: string
          example: "john_doe"
        password:
          type: string
          format: password
          example: "secret123"
    AuthResponseModel:
      type: object
      required:
        - user
        - session_id
      properties:
        user:
          $ref: "#/components/schemas/UserModel"
        session_id:
          type: string
          format: uuid
