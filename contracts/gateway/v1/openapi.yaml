openapi: 3.0.3
info:
  title: CoreService API
  version: 0.0.1
paths:
  /problems:
    get:
      operationId: ListProblems
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
        - name: search
          in: query
          schema:
            type: string
          example: "Fibonacci"
        - name: descending
          in: query
          schema:
            type: boolean
        - name: owner
          in: query
          schema:
            type: boolean
          example: true
        - name: organization_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProblemsResponseModel"
    post:
      operationId: CreateProblem
      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
          example: "Problem 1"
        - name: organization_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreationResponseModel"
  /problems/{id}:
    get:
      operationId: GetProblem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProblemResponseModel"
    delete:
      operationId: DeleteProblem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content: {}
    patch:
      operationId: UpdateProblem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProblemRequestModel"
      responses:
        "200":
          description: OK
          content: {}
  /contests:
    post:
      operationId: CreateContest
      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
          example: "Contest 1"
        - name: organization_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreationResponseModel"
  /admin/contests:
    get:
      operationId: ListAdminContests
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
        - name: search
          in: query
          schema:
            type: string
          example: "Contest"
        - name: visibility
          in: query
          schema:
            type: string
            enum:
              - public
              - private
        - name: sortBy
          in: query
          schema:
            type: string
            enum:
              - created_at
              - updated_at
              - title
          example: "created_at"
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          example: "desc"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListContestsResponseModel"
  /user/{id}/contests:
    get:
      operationId: ListUserContests
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
        - name: search
          in: query
          schema:
            type: string
          example: "Contest"
        - name: sortBy
          in: query
          schema:
            type: string
            enum:
              - last_submission_time
              - created_at
              - updated_at
              - title
          example: "last_submission_time"
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          example: "desc"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUserContestsResponseModel"
  /workshop/contests:
    get:
      operationId: ListWorkshopContests
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
        - name: search
          in: query
          schema:
            type: string
          example: "Contest"
        - name: sortBy
          in: query
          schema:
            type: string
            enum:
              - created_at
              - updated_at
              - title
          example: "created_at"
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          example: "desc"
        - name: organization_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListContestsResponseModel"
  /public/contests:
    get:
      operationId: ListPublicContests
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
        - name: search
          in: query
          schema:
            type: string
          example: "Contest"
        - name: sortBy
          in: query
          schema:
            type: string
            enum:
              - created_at
              - updated_at
              - title
          example: "created_at"
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          example: "desc"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListContestsResponseModel"
  /contests/{contest_id}:
    get:
      operationId: GetContest
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetContestResponseModel"
    delete:
      operationId: DeleteContest
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
    patch:
      operationId: UpdateContest
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContestRequestModel"
      responses:
        "200":
          description: OK
  /contests/{contest_id}/problems:
    post:
      operationId: CreateContestProblem
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: problem_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreationResponseModel"
  /contests/{contest_id}/problems/{problem_id}:
    get:
      operationId: GetContestProblem
      parameters:
        - name: problem_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetContestProblemResponseModel"
    delete:
      operationId: DeleteContestProblem
      parameters:
        - name: problem_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
  /contests/{contest_id}/members:
    get:
      operationId: ListContestMembers
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListContestMembersResponseModel"
    post:
      operationId: CreateContestMember
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreationResponseModel"
    delete:
      operationId: DeleteContestMember
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
    patch:
      operationId: UpdateContestMember
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: role
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
  /contests/{contest_id}/my-role:
    get:
      operationId: GetMyContestRole
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMyContestRoleResponseModel"
  /contests/{contest_id}/submissions:
    get:
      operationId: ListContestSubmissions
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: problemId
          in: query
          schema:
            type: string
            format: uuid
        - name: state
          in: query
          schema:
            type: integer
            format: int32
          example: 1
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          example: "asc"
        - name: language
          in: query
          schema:
            type: integer
            format: int32
          example: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubmissionsResponseModel"
  /submissions:
    post:
      operationId: CreateSubmission
      parameters:
        - name: problem_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: contest_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: language
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubmissionRequestModel"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreationResponseModel"
    get:
      operationId: ListSubmissions
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
        - name: contestId
          in: query
          schema:
            type: string
            format: uuid
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: problemId
          in: query
          schema:
            type: string
            format: uuid
        - name: state
          in: query
          schema:
            type: integer
            format: int32
          example: 1
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          example: "asc"
        - name: language
          in: query
          schema:
            type: integer
            format: int32
          example: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubmissionsResponseModel"
  /submissions/{submission_id}:
    get:
      operationId: GetSubmission
      parameters:
        - name: submission_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSubmissionResponseModel"
  /health:
    get:
      operationId: GetHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetHealthResponseModel"
  /users:
    get:
      operationId: ListUsers
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
        - name: search
          in: query
          schema:
            type: string
          example: "john"
        - name: role
          in: query
          schema:
            type: string
          example: "admin"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUsersResponseModel"
  /users/{id}:
    get:
      operationId: GetUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserResponseModel"
  /users/{user_id}/submissions:
    get:
      operationId: ListUserSubmissions
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int32
          example: 10
        - name: contestId
          in: query
          schema:
            type: string
            format: uuid
        - name: problemId
          in: query
          schema:
            type: string
            format: uuid
        - name: state
          in: query
          schema:
            type: integer
            format: int32
          example: 1
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          example: "asc"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubmissionsResponseModel"
  /users/me:
    get:
      operationId: GetMe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserResponseModel"
  /users/{id}/avatar:
    post:
      operationId: UploadAvatar
      summary: Upload user avatar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        "200":
          description: Avatar uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  imgId:
                    type: string
                    format: uuid
    delete:
      operationId: DeleteAvatar
      summary: Delete user avatar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Avatar deleted successfully
  /problems/import:
    post:
      operationId: ImportProblem
      summary: Import problem from package
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                package:
                  type: string
                  format: binary
                  description: Problem package archive (zip)
      responses:
        "200":
          description: Problem imported successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreationResponseModel"
  /problems/{id}/publish:
    post:
      operationId: PublishProblem
      summary: Publish problem package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Problem published successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: integer
                    format: int32
                  message:
                    type: string
  /problems/{id}/packages:
    get:
      operationId: ListProblemPackages
      summary: List all packages for a problem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of problem packages
          content:
            application/json:
              schema:
                type: object
                properties:
                  packages:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        version:
                          type: integer
                          format: int32
                        status:
                          type: string
                        git_commit_hash:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        compiled_at:
                          type: string
                          format: date-time
  /problems/{id}/package/{version}:
    get:
      operationId: GetPublishedPackage
      summary: Get redirect to published problem package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to package download URL
          headers:
            Location:
              schema:
                type: string
                description: Presigned S3 URL for package download
  /problems/{problemId}/workshop/init:
    post:
      operationId: InitProblemWorkshop
      summary: Initialize problem workshop with Git repository
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workshop initialized successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  commit_sha:
                    type: string
  /problems/{problemId}/workshop/files:
    get:
      operationId: ListWorkshopFiles
      summary: List files in problem repository
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: path
          in: query
          schema:
            type: string
            default: ""
          description: Directory path to list (empty for root)
      responses:
        "200":
          description: List of files
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      $ref: "#/components/schemas/FileEntry"
  /problems/{problemId}/workshop/files/{path}:
    get:
      operationId: GetWorkshopFile
      summary: Read file content from repository
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
    put:
      operationId: UpdateWorkshopFile
      summary: Update file content in repository
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: path
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: File updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
    delete:
      operationId: DeleteWorkshopFile
      summary: Delete file from repository
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File deleted successfully
  /problems/{problemId}/workshop/commit:
    post:
      operationId: CommitWorkshopChanges
      summary: Commit changes to repository
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  description: Commit message
                author_name:
                  type: string
                  description: Author name
                author_email:
                  type: string
                  description: Author email
      responses:
        "200":
          description: Changes committed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  commit_sha:
                    type: string
                  message:
                    type: string
  /problems/{problemId}/workshop/status:
    get:
      operationId: GetWorkshopStatus
      summary: Get current workshop status
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workshop status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkshopStatus"
  /problems/{problemId}/workshop/history:
    get:
      operationId: GetWorkshopHistory
      summary: Get commit history
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
