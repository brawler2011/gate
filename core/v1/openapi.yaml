openapi: 3.0.3
info:
  title: CoreService API
  version: 0.0.1
paths:
  /problems:
    get:
      operationId: ListProblems
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 10
        - name: search
          in: query
          schema:
            type: string
          example: "Fibonacci"
        - name: descending
          in: query
          schema:
            type: boolean
        - name: owner
          in: query
          schema:
            type: boolean
          example: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProblemsResponseModel"
    post:
      operationId: CreateProblem
      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
          example: "Problem 1"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreationResponseModel"
  /problems/{id}:
    get:
      operationId: GetProblem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProblemResponseModel"
    delete:
      operationId: DeleteProblem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content: {}
    patch:
      operationId: UpdateProblem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProblemRequestModel"
      responses:
        "200":
          description: OK
          content: {}
  /contests:
    get:
      operationId: ListContests
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 10
        - name: search
          in: query
          schema:
            type: string
          example: "Contest"
        - name: owner
          in: query
          schema:
            type: boolean
        - name: descending
          in: query
          schema:
            type: boolean
            default: false
          example: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListContestsResponseModel"
    post:
      operationId: CreateContest
      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
          example: "Contest 1"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreationResponseModel"
  /contests/{contest_id}:
    get:
      operationId: GetContest
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetContestResponseModel"
    delete:
      operationId: DeleteContest
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
    patch:
      operationId: UpdateContest
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContestRequestModel"
      responses:
        "200":
          description: OK
  /contests/{contest_id}/problems:
    post:
      operationId: CreateContestProblem
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: problem_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreationResponseModel"
  /contests/{contest_id}/problems/{problem_id}:
    get:
      operationId: GetContestProblem
      parameters:
        - name: problem_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetContestProblemResponseModel"
    delete:
      operationId: DeleteContestProblem
      parameters:
        - name: problem_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
  /contests/{contest_id}/members:
    get:
      operationId: ListContestMembers
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 10
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListContestMembersResponseModel"
    post:
      operationId: CreateContestMember
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreationResponseModel"
    delete:
      operationId: DeleteContestMember
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
  /contests/{contest_id}/my-role:
    get:
      operationId: GetMyContestRole
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMyContestRoleResponseModel"
  /contests/{contest_id}/submissions:
    get:
      operationId: ListContestSubmissions
      parameters:
        - name: contest_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 10
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: problemId
          in: query
          schema:
            type: string
            format: uuid
        - name: state
          in: query
          schema:
            type: integer
            format: int64
          example: 1
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          example: "asc"
        - name: language
          in: query
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubmissionsResponseModel"
  /submissions:
    post:
      operationId: CreateSubmission
      parameters:
        - name: problem_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: contest_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: language
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubmissionRequestModel"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreationResponseModel"
    get:
      operationId: ListSubmissions
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 10
        - name: contestId
          in: query
          schema:
            type: string
            format: uuid
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: problemId
          in: query
          schema:
            type: string
            format: uuid
        - name: state
          in: query
          schema:
            type: integer
            format: int64
          example: 1
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          example: "asc"
        - name: language
          in: query
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubmissionsResponseModel"
  /submissions/{submission_id}:
    get:
      operationId: GetSubmission
      parameters:
        - name: submission_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSubmissionResponseModel"
  /health:
    get:
      operationId: GetHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetHealthResponseModel"
  /users:
    get:
      operationId: ListUsers
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 10
        - name: search
          in: query
          schema:
            type: string
          example: "john"
        - name: role
          in: query
          schema:
            type: string
          example: "admin"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUsersResponseModel"
  /users/{id}:
    get:
      operationId: GetUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserResponseModel"
  /users/{user_id}/submissions:
    get:
      operationId: ListUserSubmissions
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 10
        - name: contestId
          in: query
          schema:
            type: string
            format: uuid
        - name: problemId
          in: query
          schema:
            type: string
            format: uuid
        - name: state
          in: query
          schema:
            type: integer
            format: int64
          example: 1
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          example: "asc"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubmissionsResponseModel"
components:
  schemas:
    CreationResponseModel:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
    PaginationModel:
      type: object
      required:
        - page
        - total
      properties:
        page:
          type: integer
          format: int64
          example: 1
        total:
          type: integer
          format: int64
          example: 10
    ProblemModel:
      type: object
      required:
        - id
        - created_by

        - visibility

        - title
        - time_limit
        - memory_limit

        - legend
        - input_format
        - output_format
        - notes
        - scoring

        - legend_html
        - input_format_html
        - output_format_html
        - notes_html
        - scoring_html

        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
        visibility:
          type: string
        title:
          type: string
          example: "Test problem"
        time_limit:
          type: integer
          format: int64
          example: 1000
        memory_limit:
          type: integer
          format: int64
          example: 256

        legend:
          type: string
        input_format:
          type: string
        output_format:
          type: string
        notes:
          type: string
        scoring:
          type: string

        legend_html:
          type: string
        input_format_html:
          type: string
        output_format_html:
          type: string
        notes_html:
          type: string
        scoring_html:
          type: string

        is_private:
          type: boolean
          example: true

        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ProblemsListItemModel:
      type: object
      required:
        - id
        - title
        - memory_limit
        - time_limit
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        memory_limit:
          type: integer
          format: int64
        time_limit:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ListProblemsResponseModel:
      type: object
      required:
        - problems
        - pagination
      properties:
        problems:
          type: array
          items:
            $ref: "#/components/schemas/ProblemsListItemModel"
        pagination:
          $ref: "#/components/schemas/PaginationModel"
    GetProblemResponseModel:
      type: object
      required:
        - problem
      properties:
        problem:
          $ref: "#/components/schemas/ProblemModel"
    ContestProblemModel:
      type: object
      required:
        - problem_id
        - title
        - time_limit
        - memory_limit

        - position

        - legend_html
        - input_format_html
        - output_format_html
        - notes_html
        - scoring_html

        - created_at
        - updated_at
      properties:
        problem_id:
          type: string
          format: uuid
        title:
          type: string
          example: "Test problem"
        time_limit:
          type: integer
          format: int64
          example: 1000
        memory_limit:
          type: integer
          format: int64
          example: 256

        position:
          type: integer
          format: int64

        legend_html:
          type: string
        input_format_html:
          type: string
        output_format_html:
          type: string
        notes_html:
          type: string
        scoring_html:
          type: string

        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    GetContestProblemResponseModel:
      type: object
      required:
        - problem
      properties:
        problem:
          $ref: "#/components/schemas/ContestProblemModel"
    ContestModel:
      type: object
      required:
        - id
        - title
        - description
        - visibility
        - monitor_scope
        - submissions_list_scope
        - submissions_review_scope
        - created_by
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: "Test contest"
        description:
          type: string
        visibility:
          type: string
        monitor_scope:
          type: string
        submissions_list_scope:
          type: string
        submissions_review_scope:
          type: string
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ListContestsResponseModel:
      type: object
      required:
        - contests
        - pagination
      properties:
        contests:
          type: array
          items:
            $ref: "#/components/schemas/ContestModel"
        pagination:
          $ref: "#/components/schemas/PaginationModel"
    ContestProblemListItemModel:
      type: object
      required:
        - problem_id
        - position
        - title
        - memory_limit
        - time_limit
        - created_at
        - updated_at
      properties:
        problem_id:
          type: string
          format: uuid
        position:
          type: integer
          format: int64
        title:
          type: string
          example: "Test task"
        memory_limit:
          type: integer
          format: int64
          example: 256
        time_limit:
          type: integer
          format: int64
          example: 1000
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    GetContestResponseModel:
      type: object
      required:
        - contest
        - problems
      properties:
        contest:
          $ref: "#/components/schemas/ContestModel"
        problems:
          type: array
          items:
            $ref: "#/components/schemas/ContestProblemListItemModel"
    UpdateProblemRequestModel:
      type: object
      properties:
        title:
          type: string
          example: "Test problem"
        legend:
          type: string
        input_format:
          type: string
        output_format:
          type: string
        notes:
          type: string
        scoring:
          type: string
        memory_limit:
          type: integer
          format: int64
          example: 256
        time_limit:
          type: integer
          format: int64
          example: 1000
        visibility:
          type: string
          example: private
    UpdateContestRequestModel:
      type: object
      properties:
        title:
          type: string
          example: "Test contest"
        description:
          type: string
        visibility:
          type: string
          example: "private"
        monitor_scope:
          type: string
          example: "participant"
        submissions_list_scope:
          type: string
          example: "moderator"
        submissions_review_scope:
          type: string
          example: "admin"
    CreateSubmissionRequestModel:
      type: object
      required:
        - submission
      properties:
        submission:
          type: string
    ListSubmissionsResponseModel:
      type: object
      required:
        - submissions
        - pagination
      properties:
        access-token:
          type: string
        submissions:
          type: array
          items:
            $ref: "#/components/schemas/SubmissionsListItemModel"
        pagination:
          $ref: "#/components/schemas/PaginationModel"
    SubmissionsListItemModel:
      type: object
      required:
        - id

        - user_id
        - username

        - state
        - score
        - penalty
        - time_stat
        - memory_stat
        - language

        - problem_id
        - problem_title

        - position

        - contest_id
        - contest_title

        - updated_at
        - created_at
      properties:
        id:
          type: string
          format: uuid

        user_id:
          type: string
          format: uuid
        username:
          type: string
          example: "user123"

        state:
          type: integer
          format: int64
          example: 1
        score:
          type: integer
          format: int64
          example: 100
        penalty:
          type: integer
          format: int64
          example: 28
        time_stat:
          type: integer
          format: int64
          example: 1000
        memory_stat:
          type: integer
          format: int64
          example: 256
        language:
          type: integer
          format: int64
          example: 1

        problem_id:
          type: string
          format: uuid
        problem_title:
          type: string
          example: "Task title"

        position:
          type: integer
          format: int64
          example: 1

        contest_id:
          type: string
          format: uuid
        contest_title:
          type: string
          example: "Contest title"

        updated_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    SubmissionModel:
      type: object
      required:
        - id

        - user_id
        - username

        - submission

        - state
        - score
        - penalty
        - time_stat
        - memory_stat
        - language

        - problem_id
        - problem_title

        - position

        - contest_id
        - contest_title

        - updated_at
        - created_at
      properties:
        id:
          type: string
          format: uuid

        user_id:
          type: string
          format: uuid
        username:
          type: string
          example: "user123"

        submission:
          type: string
          example: 'print("Hello, world!")'

        state:
          type: integer
          format: int64
          example: 1
        score:
          type: integer
          format: int64
          example: 100
        penalty:
          type: integer
          format: int64
          example: 28
        time_stat:
          type: integer
          format: int64
          example: 1000
        memory_stat:
          type: integer
          format: int64
          example: 256
        language:
          type: integer
          format: int64
          example: 1

        problem_id:
          type: string
          format: uuid
        problem_title:
          type: string
          example: "Task title"

        position:
          type: integer
          format: int64
          example: 1

        contest_id:
          type: string
          format: uuid
        contest_title:
          type: string
          example: "Contest title"

        updated_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    GetSubmissionResponseModel:
      type: object
      required:
        - submission
      properties:
        submission:
          $ref: "#/components/schemas/SubmissionModel"
    GetUserResponseModel:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/UserModel"
    UserModel:
      type: object
      required:
        - id
        - username
        - createdAt
        - updatedAt
        - role
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          example: user123
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        role:
          type: string
    ListUsersResponseModel:
      type: object
      required:
        - users
        - pagination
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserModel"
        pagination:
          $ref: "#/components/schemas/PaginationModel"
    ListContestMembersResponseModel:
      type: object
      required:
        - members
        - pagination
      properties:
        members:
          type: array
          items:
