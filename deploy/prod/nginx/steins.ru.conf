# Production: steins.ru - HTTP to HTTPS redirect
server {
    listen 80;
    server_name steins.ru;

    # ACME challenge для Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Редирект всего остального на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Production: steins.ru - HTTPS
server {
    listen 443 ssl http2;
    server_name steins.ru;

    # SSL сертификаты
    ssl_certificate /etc/letsencrypt/live/steins.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/steins.ru/privkey.pem;
    
    # HSTS (принудительный HTTPS) - 1 год
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Block malicious requests
    location ~ ^/(wp-admin|wp-content|phpmyadmin|webpack-dev|\.env|\.git) {
        return 444;
    }

    location ~ \.php$ {
        return 444;
    }

    # Block Next.js internal paths
    location ~ ^/_next/(rsc|app-build-manifest|prerender-manifest|middleware-manifest|flight-manifest|module-fetch|dev|entrypoints|turbopack|redirect|refresh|route-loader|script|font|inline)/ {
        return 444;
    }

    location ~ ^/_next/.*\.(json|map)$ {
        return 444;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy (production)\n";
        add_header Content-Type text/plain;
    }

    # Frontend (production)
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        
        # Caching for static assets
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache_valid 200 7d;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Backend API with rate limiting
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://backend:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket
    location /ws {
        proxy_pass http://backend:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        
        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # Kratos через Next.js proxy
    location /api/.ory/ {
        limit_req zone=auth_limit burst=10 nodelay;
        
        rewrite ^/api/.ory/(.*)$ /$1 break;
        proxy_pass http://kratos:4433;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
    }

    # Kratos PROD - короткие пути (для @ory/nextjs)
    location /self-service/ {
        limit_req zone=auth_limit burst=10 nodelay;
        
        proxy_pass http://kratos:4433/self-service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
    }
    
    location /sessions/ {
        limit_req zone=auth_limit burst=10 nodelay;
        
        proxy_pass http://kratos:4433/sessions/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
    }
    
    location /health/alive {
        access_log off;
        proxy_pass http://kratos:4433/health/alive;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    
    location /health/ready {
        access_log off;
        proxy_pass http://kratos:4433/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    
    # Kratos Public API - полный путь (для прямых API вызовов)
    location /kratos/public/ {
        limit_req zone=auth_limit burst=10 nodelay;
        
        rewrite ^/kratos/public/(.*)$ /$1 break;
        proxy_pass http://kratos:4433/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    
    location = /kratos/public {
        return 301 /kratos/public/;
    }
}
