services:
  backend:
    image: ghcr.io/brawler2011/gate-backend:prod
    container_name: gate-backend-prod
    hostname: backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ADDRESS=${BACKEND_ADDRESS}
      - PRIVATE_ADDRESS=${BACKEND_PRIVATE_ADDRESS}
      - POSTGRES_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_APP_DB}?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${REDIS_DB_INDEX}
      - NATS_URL=nats://${NATS_HOST}:${NATS_PORT}
      - GOJUDGE_GRPC_ADDR=go-judge:5051
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
    networks:
      - gate-prod
      - traefik-network
    depends_on:
      postgres:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      nats:
        condition: service_started
      go-judge:
        condition: service_started
      master:
        condition: service_started
      volume:
        condition: service_started
      filer:
        condition: service_started
      s3:
        condition: service_started
    labels:
      - "traefik.enable=true"
      # API router (/api)
      - "traefik.http.routers.gate-backend-prod.rule=Host(`steins.ru`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.gate-backend-prod.entrypoints=websecure"
      - "traefik.http.routers.gate-backend-prod.tls=true"
      - "traefik.http.routers.gate-backend-prod.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gate-backend-prod.middlewares=gate-backend-prod-strip@docker,gate-backend-prod-headers@docker,gate-api-ratelimit@docker"
      # StripPrefix middleware
      - "traefik.http.middlewares.gate-backend-prod-strip.stripprefix.prefixes=/api"
      # WS router (/ws)
      - "traefik.http.routers.gate-backend-prod-ws.rule=Host(`steins.ru`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.gate-backend-prod-ws.entrypoints=websecure"
      - "traefik.http.routers.gate-backend-prod-ws.tls=true"
      - "traefik.http.routers.gate-backend-prod-ws.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gate-backend-prod-ws.middlewares=gate-backend-prod-headers@docker"
      # Health router (/health)
      - "traefik.http.routers.gate-backend-prod-health.rule=Host(`steins.ru`) && Path(`/health`)"
      - "traefik.http.routers.gate-backend-prod-health.entrypoints=websecure"
      - "traefik.http.routers.gate-backend-prod-health.tls=true"
      - "traefik.http.routers.gate-backend-prod-health.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gate-backend-prod-health.middlewares=gate-backend-prod-headers@docker"
      # Port configuration
      - "traefik.http.services.gate-backend-prod-svc.loadbalancer.server.port=8080"
      # Security headers middleware
      - "traefik.http.middlewares.gate-backend-prod-headers.headers.customresponseheaders.Strict-Transport-Security=max-age=31536000; includeSubDomains; preload"
      - "traefik.http.middlewares.gate-backend-prod-headers.headers.customresponseheaders.X-Frame-Options=SAMEORIGIN"
      - "traefik.http.middlewares.gate-backend-prod-headers.headers.customresponseheaders.X-Content-Type-Options=nosniff"
      - "traefik.http.middlewares.gate-backend-prod-headers.headers.customresponseheaders.X-XSS-Protection=1; mode=block"
      - "traefik.http.middlewares.gate-backend-prod-headers.headers.customresponseheaders.Referrer-Policy=strict-origin-when-cross-origin"
      # Rate limit middleware (10 req/s, burst 20)
      - "traefik.http.middlewares.gate-api-ratelimit.ratelimit.average=10"
      - "traefik.http.middlewares.gate-api-ratelimit.ratelimit.burst=20"

  backend-migrate:
    image: ghcr.io/brawler2011/gate-backend:prod
    container_name: gate-backend-migrate-prod
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_APP_DB}?sslmode=disable
    networks:
      - gate-prod
    command: ["--migrate"]
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

  frontend:
    image: ghcr.io/brawler2011/gate-frontend:prod
    container_name: gate-frontend-prod
    hostname: frontend
    restart: unless-stopped
    environment:
      - BACKEND_API_URL=${BACKEND_API_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - WEBSOCKET_URL=${WEBSOCKET_URL}
    networks:
      - gate-prod
      - traefik-network
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gate-frontend-prod.rule=Host(`steins.ru`)"
      - "traefik.http.routers.gate-frontend-prod.entrypoints=websecure"
      - "traefik.http.routers.gate-frontend-prod.tls=true"
      - "traefik.http.routers.gate-frontend-prod.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gate-frontend-prod.middlewares=gate-frontend-prod-headers@docker"
      - "traefik.http.services.gate-frontend-prod-svc.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.gate-frontend-prod-headers.headers.customresponseheaders.Strict-Transport-Security=max-age=31536000; includeSubDomains; preload"
      - "traefik.http.middlewares.gate-frontend-prod-headers.headers.customresponseheaders.X-Frame-Options=SAMEORIGIN"
      - "traefik.http.middlewares.gate-frontend-prod-headers.headers.customresponseheaders.X-Content-Type-Options=nosniff"
      - "traefik.http.middlewares.gate-frontend-prod-headers.headers.customresponseheaders.X-XSS-Protection=1; mode=block"
      - "traefik.http.middlewares.gate-frontend-prod-headers.headers.customresponseheaders.Referrer-Policy=strict-origin-when-cross-origin"
      # IP Allow List middleware to return 403 Forbidden (localhost allowed, rest blocked)
      - "traefik.http.middlewares.gate-block-ip.ipallowlist.sourcerange=127.0.0.1/32"
      # Malicious requests block router
      - "traefik.http.routers.gate-malicious-block.rule=Host(`steins.ru`) && (PathRegexp(`^/(wp-admin|wp-content|phpmyadmin|webpack-dev|\\.env|\\.git)`) || PathRegexp(`.*\\.php$$`) || PathRegexp(`^/_next/(rsc|app-build-manifest|prerender-manifest|middleware-manifest|flight-manifest|module-fetch|dev|entrypoints|turbopack|redirect|refresh|route-loader|script|font|inline)/`) || PathRegexp(`^/_next/.*\\.(json|map)$$`))"
      - "traefik.http.routers.gate-malicious-block.entrypoints=websecure"
      - "traefik.http.routers.gate-malicious-block.tls=true"
      - "traefik.http.routers.gate-malicious-block.middlewares=gate-block-ip@docker"
      - "traefik.http.routers.gate-malicious-block.service=gate-frontend-prod-svc"

  postgres:
    image: postgres:18-alpine
    container_name: gate-postgres-prod
    hostname: postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - gate-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  redis:
    image: redis:7.2.4-alpine
    container_name: gate-redis-prod
    hostname: redis
    restart: unless-stopped
    command: >
      sh -c "redis-server
      --requirepass $$REDIS_PASSWORD
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - gate-prod
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  nats:
    image: nats:2.10-alpine
    container_name: gate-nats-prod
    hostname: nats
    restart: unless-stopped
    command: ["--js", "--store_dir=/data"]
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - nats-data:/data
    networks:
      - gate-prod
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  go-judge:
    build:
      context: ../local
      dockerfile: Dockerfile.go-judge
    image: gate-go-judge-prod:latest
    container_name: gate-go-judge-prod
    hostname: go-judge
    restart: unless-stopped
    command:
      - "-enable-grpc"
      - "-grpc-addr=0.0.0.0:5051"
    ports:
      - "5051:5051"
    privileged: true
    volumes:
      - ./go-judge-data:/data
    networks:
      - gate-prod
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M

  master:
    image: chrislusf/seaweedfs:3.77_full
    container_name: gate-seaweed-master-prod
    volumes:
      - seaweedfs-master:/data
    networks:
      - gate-prod
    command: "-v 9 master -ip=master -ip.bind=0.0.0.0 -metricsPort=9324"
    restart: always

  volume:
    image: chrislusf/seaweedfs:3.77_full
    container_name: gate-seaweed-volume-prod
    volumes:
      - seaweedfs-volume:/data
    networks:
      - gate-prod
    command: '-v 9 volume -mserver="master:9333" -ip=volume -ip.bind=0.0.0.0 -port=2 -dir=/data -max=100 -metricsPort=9325'
    depends_on:
      - master
    restart: always

  filer:
    image: chrislusf/seaweedfs:3.77_full
    container_name: gate-seaweed-filer-prod
    volumes:
      - seaweedfs-filer:/data
    networks:
      - gate-prod
    command: '-v 9 filer -master="master:9333" -ip.bind=0.0.0.0 -metricsPort=9326'
    depends_on:
      - master
      - volume
    restart: always

  s3:
    image: chrislusf/seaweedfs:3.77_full
    container_name: gate-seaweed-s3-prod
    hostname: s3
    networks:
      - gate-prod
    command: '-v 9 s3 -filer="filer:8888" -ip.bind=0.0.0.0 -metricsPort=9327 -config=/etc/seaweedfs/s3.json'
    volumes:
      - ./s3.json:/etc/seaweedfs/s3.json
    depends_on:
      - master
      - volume
      - filer
    restart: always

volumes:
  postgres-data:
    name: gate-postgres-data-prod
  redis-data:
    name: gate-redis-data-prod
  nats-data:
    name: gate-nats-data-prod
  seaweedfs-master:
    name: gate-seaweedfs-master-prod
  seaweedfs-volume:
    name: gate-seaweedfs-volume-prod
  seaweedfs-filer:
    name: gate-seaweedfs-filer-prod

networks:
  gate-prod:
    name: gate-network-prod
    driver: bridge
  traefik-network:
    name: traefik-network
    external: true
