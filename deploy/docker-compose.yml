services:
  frontend:
    env_file:
      - ../.env.production
    build:
      context: ../..
      dockerfile: frontend/deploy/Dockerfile
      args:
        # Only NEXT_PUBLIC_* vars need to be baked in at build time
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: gate149-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_API_URL=${BACKEND_API_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    networks:
      # - gate_network
      - gate149-network
      # - infrastructure_gate_network  # сеть nginx (обычно это default/bridge)

networks:
  gate149-network:
    driver: bridge
  infrastructure_gate_network :
    external: true  # использовать существующую default сеть
