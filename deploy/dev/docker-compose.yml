services:
  backend:
    build:
      context: ../../
      dockerfile: backend/Dockerfile
    container_name: gate-backend-dev
    hostname: backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_APP_DB}?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${REDIS_DB_INDEX}
      - NATS_URL=nats://${NATS_HOST}:${NATS_PORT}
      - GOJUDGE_GRPC_ADDR=go-judge:5051
    networks:
      - gate-dev
    depends_on:
      postgres:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      nats:
        condition: service_started
      go-judge:
        condition: service_started
    command: ["server"]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend-migrate:
    build:
      context: ../../
      dockerfile: backend/Dockerfile
    container_name: gate-backend-migrate-dev
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_APP_DB}?sslmode=disable
    networks:
      - gate-dev
    command: ["migrate"]
    restart: "no"

  frontend:
    build:
      context: ../../
      dockerfile: frontend/deploy/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        BACKEND_API_URL: ${BACKEND_API_URL}
        WEBSOCKET_URL: ${WEBSOCKET_URL}
    container_name: gate-frontend-dev
    hostname: frontend
    restart: unless-stopped
    networks:
      - gate-dev
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:14.20-alpine
    container_name: gate-postgres-dev
    hostname: postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - gate-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 3s
      retries: 5

  kratos-migrate:
    image: oryd/kratos:v1.3.1
    container_name: gate-kratos-migrate-dev
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./kratos/kratos.yml:/etc/config/kratos/kratos.yml:ro
    command: migrate sql -e --yes --config /etc/config/kratos/kratos.yml
    env_file:
      - .env
    environment:
      - DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_KRATOS_DB}?sslmode=disable
    networks:
      - gate-dev
    restart: "no"

  kratos:
    image: oryd/kratos:v1.3.1
    container_name: gate-kratos-dev
    hostname: kratos
    restart: unless-stopped
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    volumes:
      - ../base/kratos/webhook_body.jsonnet:/etc/config/kratos/webhook_body.jsonnet:ro
      - ./kratos/kratos.yml:/etc/config/kratos/kratos.yml:ro
      - ../base/kratos/identity.schema.json:/etc/config/kratos/identity.schema.json:ro
    command: serve --dev --config /etc/config/kratos/kratos.yml
    env_file:
      - .env
    environment:
      - DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_KRATOS_DB}?sslmode=disable
    networks:
      - gate-dev

  redis:
    image: redis:7.2.4-alpine
    container_name: gate-redis-dev
    hostname: redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - gate-dev

  nats:
    image: nats:2.10-alpine
    container_name: gate-nats-dev
    hostname: nats
    restart: unless-stopped
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - nats-data:/data
    networks:
      - gate-dev

  go-judge:
    image: criyle/go-judge:latest
    container_name: gate-go-judge-dev
    hostname: go-judge
    restart: unless-stopped
    ports:
      - "5050:5050"
      - "5051:5051"
    privileged: true
    volumes:
      - ./go-judge-data:/data
    networks:
      - gate-dev

  nginx:
    image: nginx:alpine
    container_name: gate-nginx-dev
    hostname: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/dev.gate149.ru.conf:/etc/nginx/conf.d/dev.gate149.ru.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
      - kratos
      - go-judge
    networks:
      - gate-dev

  certbot:
    image: certbot/certbot:latest
    container_name: gate-certbot-dev
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    networks:
      - gate-dev
    profiles:
      - tools

  certbot-renew:
    image: certbot/certbot:latest
    container_name: gate-certbot-renew-dev
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - gate-dev
    restart: unless-stopped

volumes:
  postgres-data:
    name: gate-postgres-data-dev
  redis-data:
    name: gate-redis-data-dev
  nats-data:
    name: gate-nats-data-dev
  certbot-conf:
    name: gate-certbot-conf-dev
  certbot-www:
    name: gate-certbot-www-dev

networks:
  gate-dev:
    name: gate-network-dev
    driver: bridge
