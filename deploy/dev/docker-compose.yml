services:
  backend:
    image: ghcr.io/brawler2011/gate-backend:dev
    container_name: gate-backend-dev
    hostname: backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ADDRESS=${BACKEND_ADDRESS}
      - PRIVATE_ADDRESS=${BACKEND_PRIVATE_ADDRESS}
      - POSTGRES_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_APP_DB}?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${REDIS_DB_INDEX}
      - NATS_URL=nats://${NATS_HOST}:${NATS_PORT}
      - GOJUDGE_GRPC_ADDR=go-judge:5051
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
    networks:
      - gate-dev
      - traefik-network
    depends_on:
      postgres:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      nats:
        condition: service_started
      go-judge:
        condition: service_started
      master:
        condition: service_started
      volume:
        condition: service_started
      filer:
        condition: service_started
      s3:
        condition: service_started
    labels:
      - "traefik.enable=true"
      # API router (/api)
      - "traefik.http.routers.gate-backend-dev.rule=Host(`dev.gate149.ru`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.gate-backend-dev.entrypoints=websecure"
      - "traefik.http.routers.gate-backend-dev.tls=true"
      - "traefik.http.routers.gate-backend-dev.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gate-backend-dev.middlewares=gate-backend-dev-strip@docker,gate-backend-dev-headers@docker"
      # StripPrefix middleware
      - "traefik.http.middlewares.gate-backend-dev-strip.stripprefix.prefixes=/api"
      # WS router (/ws)
      - "traefik.http.routers.gate-backend-dev-ws.rule=Host(`dev.gate149.ru`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.gate-backend-dev-ws.entrypoints=websecure"
      - "traefik.http.routers.gate-backend-dev-ws.tls=true"
      - "traefik.http.routers.gate-backend-dev-ws.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gate-backend-dev-ws.middlewares=gate-backend-dev-headers@docker"
      # Health router (/health)
      - "traefik.http.routers.gate-backend-dev-health.rule=Host(`dev.gate149.ru`) && Path(`/health`)"
      - "traefik.http.routers.gate-backend-dev-health.entrypoints=websecure"
      - "traefik.http.routers.gate-backend-dev-health.tls=true"
      - "traefik.http.routers.gate-backend-dev-health.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gate-backend-dev-health.middlewares=gate-backend-dev-headers@docker"
      # Port configuration
      - "traefik.http.services.gate-backend-dev-svc.loadbalancer.server.port=8080"
      # Security headers middleware
      - "traefik.http.middlewares.gate-backend-dev-headers.headers.customresponseheaders.Strict-Transport-Security=max-age=31536000; includeSubDomains"
      - "traefik.http.middlewares.gate-backend-dev-headers.headers.customresponseheaders.X-Frame-Options=SAMEORIGIN"
      - "traefik.http.middlewares.gate-backend-dev-headers.headers.customresponseheaders.X-Content-Type-Options=nosniff"
      - "traefik.http.middlewares.gate-backend-dev-headers.headers.customresponseheaders.X-XSS-Protection=1; mode=block"

  backend-migrate:
    image: ghcr.io/brawler2011/gate-backend:dev
    container_name: gate-backend-migrate-dev
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_APP_DB}?sslmode=disable
    networks:
      - gate-dev
    command: ["--migrate"]
    restart: "no"

  frontend:
    image: ghcr.io/brawler2011/gate-frontend:dev
    container_name: gate-frontend-dev
    hostname: frontend
    restart: unless-stopped
    environment:
      - BACKEND_API_URL=${BACKEND_API_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - WEBSOCKET_URL=${WEBSOCKET_URL}
    networks:
      - gate-dev
      - traefik-network
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gate-frontend-dev.rule=Host(`dev.gate149.ru`)"
      - "traefik.http.routers.gate-frontend-dev.entrypoints=websecure"
      - "traefik.http.routers.gate-frontend-dev.tls=true"
      - "traefik.http.routers.gate-frontend-dev.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gate-frontend-dev.middlewares=gate-frontend-dev-headers@docker"
      - "traefik.http.services.gate-frontend-dev-svc.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.gate-frontend-dev-headers.headers.customresponseheaders.Strict-Transport-Security=max-age=31536000; includeSubDomains"
      - "traefik.http.middlewares.gate-frontend-dev-headers.headers.customresponseheaders.X-Frame-Options=SAMEORIGIN"
      - "traefik.http.middlewares.gate-frontend-dev-headers.headers.customresponseheaders.X-Content-Type-Options=nosniff"
      - "traefik.http.middlewares.gate-frontend-dev-headers.headers.customresponseheaders.X-XSS-Protection=1; mode=block"

  postgres:
    image: postgres:18-alpine
    container_name: gate-postgres-dev
    hostname: postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - gate-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.2.4-alpine
    container_name: gate-redis-dev
    hostname: redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - gate-dev

  nats:
    image: nats:2.10-alpine
    container_name: gate-nats-dev
    hostname: nats
    restart: unless-stopped
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - nats-data:/data
    networks:
      - gate-dev

  go-judge:
    image: criyle/go-judge:v1.11.3
    container_name: gate-go-judge-dev
    hostname: go-judge
    restart: unless-stopped
    command:
      - "-enable-grpc"
      - "-grpc-addr=0.0.0.0:5051"
    ports:
      - "5051:5051"
    privileged: true
    volumes:
      - ./go-judge-data:/data
    networks:
      - gate-dev

  master:
    image: chrislusf/seaweedfs:3.77_full
    container_name: gate-seaweed-master-dev
    volumes:
      - seaweedfs-master:/data
    networks:
      - gate-dev
    command: "-v 9 master -ip=master -ip.bind=0.0.0.0 -metricsPort=9324"
    restart: always

  volume:
    image: chrislusf/seaweedfs:3.77_full
    container_name: gate-seaweed-volume-dev
    volumes:
      - seaweedfs-volume:/data
    networks:
      - gate-dev
    command: '-v 9 volume -mserver="master:9333" -ip=volume -ip.bind=0.0.0.0 -port=2 -dir=/data -max=100 -metricsPort=9325'
    depends_on:
      - master
    restart: always

  filer:
    image: chrislusf/seaweedfs:3.77_full
    container_name: gate-seaweed-filer-dev
    volumes:
      - seaweedfs-filer:/data
    networks:
      - gate-dev
    command: '-v 9 filer -master="master:9333" -ip.bind=0.0.0.0 -metricsPort=9326'
    depends_on:
      - master
      - volume
    restart: always

  s3:
    image: chrislusf/seaweedfs:3.77_full
    container_name: gate-seaweed-s3-dev
    hostname: s3
    networks:
      - gate-dev
    command: '-v 9 s3 -filer="filer:8888" -ip.bind=0.0.0.0 -metricsPort=9327 -config=/etc/seaweedfs/s3.json'
    volumes:
      - ./s3.json:/etc/seaweedfs/s3.json
    depends_on:
      - master
      - volume
      - filer
    restart: always

volumes:
  postgres-data:
    name: gate-postgres-data-dev
  redis-data:
    name: gate-redis-data-dev
  nats-data:
    name: gate-nats-data-dev
  seaweedfs-master:
    name: gate-seaweedfs-master-dev
  seaweedfs-volume:
    name: gate-seaweedfs-volume-dev
  seaweedfs-filer:
    name: gate-seaweedfs-filer-dev

networks:
  gate-dev:
    name: gate-network-dev
    driver: bridge
  traefik-network:
    name: traefik-network
    external: true
