# Dev окружение: dev.gate149.ru - HTTP to HTTPS redirect
server {
    listen 80;
    server_name dev.gate149.ru;

    # ACME challenge для Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Редирект всего остального на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Dev окружение: dev.gate149.ru - HTTPS
server {
    listen 443 ssl http2;
    server_name dev.gate149.ru;

    # SSL сертификаты
    ssl_certificate /etc/letsencrypt/live/dev.gate149.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.gate149.ru/privkey.pem;
    
    # HSTS (принудительный HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Block malicious requests
    location ~ ^/(wp-admin|wp-content|phpmyadmin|webpack-dev|\.env|\.git) {
        return 444;
    }

    location ~ \.php$ {
        return 444;
    }

    # Block Next.js internal paths
    location ~ ^/_next/(rsc|app-build-manifest|prerender-manifest|middleware-manifest|flight-manifest|module-fetch|dev|entrypoints|turbopack|redirect|refresh|route-loader|script|font|inline)/ {
        return 444;
    }

    location ~ ^/_next/.*\.(json|map)$ {
        return 444;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy (dev)\n";
        add_header Content-Type text/plain;
    }

    # Frontend (dev)
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # WebSocket
    location /ws {
        proxy_pass http://backend:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
    }

    # Kratos через Next.js proxy (dev)
    location /api/.ory/ {
        rewrite ^/api/.ory/(.*)$ /$1 break;
        proxy_pass http://kratos:4433;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Origin $http_origin;
        proxy_set_header Cookie $http_cookie;
    }

    # Kratos DEV - короткие пути (для @ory/nextjs)
    location /self-service/ {
        proxy_pass http://kratos:4433/self-service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Origin $http_origin;
        proxy_set_header Cookie $http_cookie;
    }
    
    location /sessions/ {
        proxy_pass http://kratos:4433/sessions/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Origin $http_origin;
        proxy_set_header Cookie $http_cookie;
    }
    
    location /health/alive {
        proxy_pass http://kratos:4433/health/alive;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    
    location /health/ready {
        proxy_pass http://kratos:4433/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Kratos Admin API
    location /kratos/admin/ {
        rewrite ^/kratos/admin/(.*)$ /$1 break;
        proxy_pass http://kratos:4434/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
