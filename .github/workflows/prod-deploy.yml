name: Production Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or commit SHA)"
        required: false
        default: "main"
        type: string
      skip_verify:
        description: "Skip backend/frontend verification before deploy"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve target ref
    runs-on: ubuntu-latest
    outputs:
      deploy_ref: ${{ steps.resolve.outputs.deploy_ref }}
      run_verify: ${{ steps.resolve.outputs.run_verify }}
    steps:
      - id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            DEPLOY_REF="${{ inputs.ref }}"
            SKIP_VERIFY="${{ inputs.skip_verify }}"
          else
            DEPLOY_REF="${GITHUB_REF_NAME}"
            SKIP_VERIFY="false"
          fi

          if [[ -z "${DEPLOY_REF}" ]]; then
            echo "Deploy ref is empty."
            exit 1
          fi

          RUN_VERIFY="true"
          if [[ "${SKIP_VERIFY}" == "true" ]]; then
            RUN_VERIFY="false"
          fi

          echo "deploy_ref=${DEPLOY_REF}" >> "${GITHUB_OUTPUT}"
          echo "run_verify=${RUN_VERIFY}" >> "${GITHUB_OUTPUT}"

  verify:
    name: Verify build and tests
    needs: resolve
    if: needs.resolve.outputs.run_verify == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.deploy_ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run backend unit tests
        working-directory: backend
        run: go test ./...

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend production bundle
        working-directory: frontend
        env:
          BACKEND_API_URL: http://backend:8080
          KRATOS_PUBLIC_URL: http://kratos:4433
          NEXT_PUBLIC_APP_URL: https://steins.ru
          WEBSOCKET_URL: wss://steins.ru/ws
        run: bun run build:prod

      - name: Validate production compose and nginx config
        shell: bash
        run: |
          set -euo pipefail
          cd deploy/prod
          cp .env.example .env
          trap 'rm -f .env' EXIT
          docker compose config -q
          docker run --rm \
            --add-host frontend:127.0.0.1 \
            --add-host backend:127.0.0.1 \
            --add-host kratos:127.0.0.1 \
            -v "$PWD/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            -v "$PWD/nginx/steins.ru.conf:/etc/nginx/conf.d/steins.ru.conf:ro" \
            nginx:alpine nginx -t

  deploy:
    name: Deploy production
    needs:
      - resolve
      - verify
    if: >
      always() &&
      needs.resolve.result == 'success' &&
      (
        needs.verify.result == 'success' ||
        needs.resolve.outputs.run_verify == 'false'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment:
      name: production
      url: https://steins.ru
    steps:
      - name: Validate deploy secrets
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
        run: |
          set -euo pipefail
          for key in PROD_HOST PROD_USER PROD_APP_DIR; do
            if [[ -z "${!key}" ]]; then
              echo "Missing required secret: ${key}"
              exit 1
            fi
          done

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Add production host to known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy and rollback on failure
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
          PROD_HEALTHCHECK_URL: ${{ secrets.PROD_HEALTHCHECK_URL }}
          DEPLOY_REF: ${{ needs.resolve.outputs.deploy_ref }}
        run: |
          set -euo pipefail

          HEALTHCHECK_URL="${PROD_HEALTHCHECK_URL:-https://steins.ru/health}"

          ssh "${PROD_USER}@${PROD_HOST}" \
            bash -se -- "${PROD_APP_DIR}" "${DEPLOY_REF}" "${HEALTHCHECK_URL}" <<'REMOTE'
          set -Eeuo pipefail

          APP_DIR="$1"
          DEPLOY_REF="$2"
          HEALTHCHECK_URL="$3"

          cd "${APP_DIR}"
          PREV_SHA="$(git rev-parse HEAD)"

          rollback() {
            echo "Deployment failed. Rolling back to ${PREV_SHA}."
            cd "${APP_DIR}"
            git checkout --force "${PREV_SHA}"
            cd deploy/prod
            docker compose up -d --build
            docker compose ps
          }

          trap rollback ERR

          git fetch --all --tags --prune
          git checkout --force "${DEPLOY_REF}"

          if git show-ref --verify --quiet "refs/heads/${DEPLOY_REF}"; then
            git pull --ff-only origin "${DEPLOY_REF}"
          fi

          cd deploy/prod
          if [[ ! -f .env ]]; then
            echo "Missing deploy/prod/.env on server."
            exit 1
          fi

          docker compose config -q
          docker compose up -d --build
          docker compose ps

          curl --fail --silent --show-error --max-time 15 \
            --retry 6 --retry-delay 5 "${HEALTHCHECK_URL}" >/dev/null
          REMOTE
