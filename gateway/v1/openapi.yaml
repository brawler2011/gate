components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: ory_kratos_session
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
    PostModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        title:
          type: string
        text:
          type: string
        description:
          type: string
        preview_image_id:
          type: string
        author_id:
          type: string
          format: uuid
        author_username:
          type: string
    PostPatchRequestModel:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        text:
          type: string
        preview_image_id:
          type: string
    PaginationModel:
      type: object
      required:
        - page
        - total
      properties:
        page:
          type: integer
          format: int64
          example: 1
        total:
          type: integer
          format: int64
          example: 10
    ListPostsResponseModel:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/PaginationModel'
        posts:
          type: array
          items:
            $ref: '#/components/schemas/PostModel'
    CreatedPost:
      type: object
      properties:
        post_id:
          type: string
          format: uuid
    CreationResponseModel:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
    ProblemModel:
      type: object
      required:
        - id
        - created_by
        - visibility
        - title
        - time_limit
        - memory_limit
        - legend
        - input_format
        - output_format
        - notes
        - scoring
        - legend_html
        - input_format_html
        - output_format_html
        - notes_html
        - scoring_html
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
        visibility:
          type: string
        title:
          type: string
          example: Test problem
        time_limit:
          type: integer
          format: int64
          example: 1000
        memory_limit:
          type: integer
          format: int64
          example: 256
        legend:
          type: string
        input_format:
          type: string
        output_format:
          type: string
        notes:
          type: string
        scoring:
          type: string
        legend_html:
          type: string
