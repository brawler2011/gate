format_version: "1.0"
title: "Interactive Guessing"
type: "interactive"

limits:
  time_ms: 2000
  memory_mb: 256

subtasks:
  samples:
    points: 0
    policy: "complete"
    tests:
      - manual: "01.in"

  secret:
    points: 100
    policy: "each"
    dependencies:
      - "samples"
    tests:
      - manual: "02.in"

solutions:
  ok.cpp: "OK"
  ok.py: "OK"
  ok.go: "OK"
  wa.cpp: "WA"
  wa.py: "WA"
  wa.go: "WA"
