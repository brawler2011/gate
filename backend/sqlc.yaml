version: "2"
sql:
  - engine: "postgresql"

    queries: "internal/repository/pg/*.sql"
    schema: "cmd/migrations/"
    gen:
      go:
        package: "sqlc"
        out: "internal/repository/pg/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        emit_interface: true
        overrides:
          - db_type: "pg_catalog.uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
          - db_type: "text"
            go_type: "string"
          - db_type: "varchar"
            go_type: "string"

          - column: "submissions.language"
            go_type: "github.com/gate149/gate/backend/internal/domain/models.LanguageName"
          - column: "submissions.state"
            go_type: "github.com/gate149/gate/backend/internal/domain/models.State"
          - column: "outbox_events.status"
            go_type: "github.com/gate149/gate/backend/internal/domain/models.OutboxEventStatus"
          - column: "outbox_events.event_type"
            go_type: "github.com/gate149/gate/backend/internal/domain/models.OutboxEventType"
          - column: "outbox_events.processed_at"
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - column: "outbox_events.locked_at"
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - column: "outbox_events.deadline_at"
            go_type:
              import: "time"
              type: "Time"
              pointer: true

          - column: "images.id"
            go_type: "github.com/google/uuid.UUID"
          - column: "users.img_id"
            go_type: "*github.com/google/uuid.UUID"

          - db_type: "contest_visibility"
            go_type: "github.com/gate149/gate/backend/internal/domain/models.ContestVisibility"
          - db_type: "contest_role"
            go_type: "github.com/gate149/gate/backend/internal/domain/models.ContestRole"
          - db_type: "language_name"
            go_type: "github.com/gate149/gate/backend/internal/domain/models.LanguageName"
          - db_type: "state"
            go_type: "github.com/gate149/gate/backend/internal/domain/models.State"
          - db_type: "outbox_event_status"
            go_type: "github.com/gate149/gate/backend/internal/domain/models.OutboxEventStatus"
          - db_type: "outbox_event_type"
            go_type: "github.com/gate149/gate/backend/internal/domain/models.OutboxEventType"
